# Trino Iceberg connector configured for end-to-end encryption read tests.
# Reads tables written by Spark 3.5.6 + Iceberg 1.11.0-SNAPSHOT via HiveCatalog.
connector.name=iceberg

# Hive Metastore (Thrift) running locally (apache/hive:4.0.0 in docker)
hive.metastore.uri=thrift://localhost:9083
hive.metastore.thrift.client.max-retry-time=1s

# Local filesystem -- the warehouse path is host-local in our test setup.
fs.native-local.enabled=true

# Iceberg encryption read support (PR #28389): tells Trino which Iceberg KMS
# client to construct so it can unwrap per-file DEKs / manifest list keys.
iceberg.encryption.kms-type=AWS

# Reading unencrypted files from an encrypted table is allowed at the catalog level.
# Default false (strict). Set true to allow mixed encrypted/plaintext data when
# reading tables that have been migrated.
# iceberg.encryption.plaintext-files-allowed-for-encrypted-tables=false

iceberg.register-table-procedure.enabled=true
iceberg.allowed-extra-properties=*
