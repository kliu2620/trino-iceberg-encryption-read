# Spark 3.5.6 on JDK 17 + Iceberg 1.11.0-SNAPSHOT, HiveCatalog pointing to local
# HMS + LocalStack KMS for end-to-end Trino encryption read tests.

# Iceberg session catalog (default name "iceberg")
spark.sql.catalog.iceberg=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type=hive
spark.sql.catalog.iceberg.uri=thrift://localhost:9083

# Engage StandardEncryptionManager via AwsKeyManagementClient on the catalog. The
# wiring is what apache/iceberg PR #13066 added in 1.11.0; before that release this
# property had no effect for HiveCatalog.
spark.sql.catalog.iceberg.encryption.kms-impl=org.apache.iceberg.aws.AwsKeyManagementClient
spark.sql.catalog.iceberg.client.region=us-east-1

# Force the Hadoop FileSystem default to local files so paths in metadata stay
# host-local and Trino can read the same paths after Spark writes.
spark.hadoop.fs.defaultFS=file:///

# Iceberg Spark SQL extensions (procedures like rewrite_data_files etc.)
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Driver JVM memory ample for parquet+iceberg.
spark.driver.memory=2g
spark.serializer=org.apache.spark.serializer.KryoSerializer
